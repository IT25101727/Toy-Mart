<div class="view-section active">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Customers List</h2>
        <button onclick="App.openModal('customerModal')" class="bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-brand-500/30 transition-all flex items-center active:scale-95 hover-scale">
            <i class="fa-solid fa-plus mr-2"></i> Add New Customer
        </button>
    </div>
    
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm overflow-hidden animate-slide-up transition-colors">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50/80 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700 text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 font-semibold transition-colors">
                        <th class="px-6 py-4">Customer ID</th>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="customer-table-body" class="divide-y divide-gray-100 dark:divide-gray-800">
                    <!-- Customer rows will be injected here via JS -->
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-400 dark:text-gray-500">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Customer Modal -->
<div id="customerModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-gray-900/60 dark:bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="App.closeModal('customerModal')"></div>
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
        <div class="relative bg-white dark:bg-gray-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-lg w-full animate-modal-enter border border-gray-100 dark:border-gray-700">
            <div class="bg-white dark:bg-gray-800 px-6 pt-6 pb-6 sm:p-8">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-xl leading-6 font-semibold text-gray-900 dark:text-white" id="customerModalTitle">Add New Customer</h3>
                    <button onclick="App.closeModal('customerModal')" class="text-gray-400 dark:text-gray-500 hover:text-gray-500 dark:hover:text-gray-300 transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <form id="customerForm" class="space-y-5" onsubmit="CustomerModule.handleSubmit(event)">
                    <input type="hidden" id="customerFormMode" value="create">
                    <div>
                        <label for="customerID" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Customer ID</label>
                        <input type="text" id="customerID" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none disabled:bg-gray-100 dark:disabled:bg-gray-800" placeholder="e.g. C001">
                    </div>
                    <div>
                        <label for="customerName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name</label>
                        <input type="text" id="customerName" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="Enter full name">
                    </div>
                    <div>
                        <label for="customerEmail" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                        <input type="email" id="customerEmail" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="Enter email address">
                    </div>
                    <div>
                        <label for="customerPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                        <input type="password" id="customerPassword" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="Enter password">
                    </div>
                    
                    <div class="mt-8 flex justify-end space-x-3 pt-4 border-t border-gray-100 dark:border-gray-700">
                        <button type="button" onclick="App.closeModal('customerModal')" class="px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                            Cancel
                        </button>
                        <button type="submit" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 border border-transparent rounded-lg text-sm font-medium text-white shadow-sm transition-colors">
                            Save Customer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
