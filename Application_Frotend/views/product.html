<div class="view-section active">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Products List</h2>
    <button onclick="App.openModal('productModal')" class="bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-brand-500/30 transition-all flex items-center active:scale-95 hover-scale">
      <i class="fa-solid fa-plus mr-2"></i> Add New Product
    </button>
  </div>

  <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 animate-slide-up">
    <!-- Product cards will be injected here via JS -->
    <div class="col-span-full py-12 text-center text-gray-400 dark:text-gray-500 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm flex flex-col items-center justify-center">
      <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-brand-500"></i>
      <p>Loading products...</p>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div id="productModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-gray-900/60 dark:bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="App.closeModal('productModal')"></div>
  <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
    <div class="relative bg-white dark:bg-gray-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-lg w-full animate-modal-enter border border-gray-100 dark:border-gray-700">
      <div class="bg-white dark:bg-gray-800 px-6 pt-6 pb-6 sm:p-8">
        <div class="flex justify-between items-center mb-5">
          <h3 class="text-xl leading-6 font-semibold text-gray-900 dark:text-white" id="productModalTitle">Add New Product</h3>
          <button onclick="App.closeModal('productModal')" class="text-gray-400 dark:text-gray-500 hover:text-gray-500 dark:hover:text-gray-300 transition-colors">
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>

        <form id="productForm" class="space-y-5" onsubmit="ProductModule.handleSubmit(event)">
          <input type="hidden" id="productFormMode" value="create">

          <div>
            <label for="productID" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Product ID</label>
            <input type="text" id="productID" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none disabled:bg-gray-100 dark:disabled:bg-gray-800 cursor-not-allowed" placeholder="e.g. P001" readonly>
          </div>
          <div>
            <label for="productName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Product Name</label>
            <input type="text" id="productName" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="Enter product name">
          </div>
          <div>
            <label for="productQty" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Quantity</label>
            <input type="number" id="productQty" min="0" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="e.g. 10">
          </div>
          <div>
            <label for="productPrice" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Price</label>
            <input type="number" step="0.01" id="productPrice" min="0" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none" placeholder="e.g. 99.99">
          </div>
          <div>
            <label for="productCategory" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
            <select id="productCategory" required class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none">
              <option value="" disabled selected>Select a category</option>
              <!-- Options injected dynamically -->
            </select>
          </div>

          <div id="productImageContainer">
            <label for="productImage" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Product Image</label>
            <input type="file" id="productImage" accept="image/*" class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100">
          </div>

          <div class="mt-8 flex justify-end space-x-3 pt-4 border-t border-gray-100 dark:border-gray-700">
            <button type="button" onclick="App.closeModal('productModal')" class="px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
              Cancel
            </button>
            <button type="submit" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 border border-transparent rounded-lg text-sm font-medium text-white shadow-sm transition-colors">
              Save Product
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
