<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toy Mart - Admin Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-mesh text-gray-900 dark:text-gray-100 font-sans antialiased overflow-hidden flex h-screen transition-colors duration-300">

<!-- Login Screen Overlay -->
<div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-mesh">
  <div class="glass-card w-full max-w-md p-10 rounded-3xl shadow-2xl animate-modal-enter relative overflow-hidden">
    <!-- Decorative circle -->
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-500/10 rounded-full blur-3xl"></div>

    <div class="text-center mb-8 relative">
      <div class="w-20 h-20 bg-brand-600 rounded-2xl mx-auto flex items-center justify-center shadow-xl shadow-brand-500/30 mb-4 animate-float">
        <i class="fa-solid fa-gamepad text-white text-3xl"></i>
      </div>
      <h2 class="text-3xl font-bold text-gray-800 dark:text-white tracking-tight">Toy Mart</h2>
      <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium">Administrator Login</p>
    </div>

    <form id="login-form" onsubmit="AuthModule.handleLogin(event)" class="space-y-6 relative">
      <div class="space-y-2">
        <label class="text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Username</label>
        <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-solid fa-user"></i>
                        </span>
          <input type="text" id="login-username" required class="block w-full pl-11 pr-4 py-3.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-800 dark:text-white" placeholder="Enter username">
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Password</label>
        <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
          <input type="password" id="login-password" required class="block w-full pl-11 pr-4 py-3.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-800 dark:text-white" placeholder="••••••••">
        </div>
      </div>

      <div id="login-error" class="hidden text-red-500 bg-red-50 dark:bg-red-900/30 border border-red-100 dark:border-red-800 p-3 rounded-xl text-xs font-medium text-center animate-shake">
        Invalid username or password
      </div>

      <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-brand-500/30 transition-all transform active:scale-[0.98] flex items-center justify-center space-x-2 group">
        <span>Sign In</span>
        <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
      </button>
    </form>
  </div>
</div>

<!-- Sidebar -->
<aside id="main-sidebar" class="hidden w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-all duration-300 z-20 shadow-sm relative">
  <div class="h-16 flex items-center px-6 border-b border-gray-100 dark:border-gray-700">
    <i class="fa-solid fa-gamepad text-brand-500 text-2xl mr-3"></i>
    <span class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">Toy Mart</span>
  </div>

  <nav class="flex-1 overflow-y-auto py-4 space-y-1 px-3 mt-4">
    <button onclick="App.navigate('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group active-nav">
      <i class="fa-solid fa-chart-pie w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Dashboard</span>
    </button>
    <button onclick="App.navigate('admin')" id="nav-admin" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-user-shield w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Admin Management</span>
    </button>
    <button onclick="App.navigate('customer')" id="nav-customer" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-users w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Customer Management</span>
    </button>
    <button onclick="App.navigate('category')" id="nav-category" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-layer-group w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Category Management</span>
    </button>
    <button onclick="App.navigate('product')" id="nav-product" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-box-open w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Product Management</span>
    </button>
    <button onclick="App.navigate('order')" id="nav-order" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-cart-shopping w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Order Management</span>
    </button>
    <button onclick="App.navigate('payment')" id="nav-payment" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 dark:text-gray-300 hover:bg-brand-50 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-colors group">
      <i class="fa-solid fa-credit-card w-6 text-center text-gray-400 dark:text-gray-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
      <span class="ml-2">Payment Management</span>
    </button>
  </nav>

  <div class="p-4 border-t border-gray-100 dark:border-gray-700 flex items-center justify-between">
    <div class="flex items-center">
      <div id="user-initials" class="w-8 h-8 rounded-full bg-brand-100 dark:bg-gray-700 text-brand-600 dark:text-brand-400 flex items-center justify-center font-bold">
        A
      </div>
      <div class="ml-3">
        <p id="user-display-name" class="text-sm font-medium text-gray-700 dark:text-gray-200 truncate max-w-[100px]">Admin User</p>
        <p class="text-xs text-gray-500 dark:text-gray-400">Administrator</p>
      </div>
    </div>
    <button onclick="AuthModule.logout()" class="text-gray-400 hover:text-red-500 transition-colors p-1" title="Logout">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>
</aside>

<!-- Main Content -->
<main id="main-content" class="hidden flex-1 flex flex-col h-screen overflow-hidden relative">
  <!-- Top Header -->
  <header class="h-16 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-8 z-10 transition-colors duration-300">
    <h1 id="page-title" class="text-xl font-semibold text-gray-800 dark:text-white">Dashboard</h1>
    <div class="flex items-center space-x-6 flex-1 justify-end">
      <!-- Global Search -->
      <div id="search-container" class="relative max-w-md w-full hidden">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
        <input type="text" id="global-search" oninput="App.handleSearch(this.value)" class="block w-full pl-10 pr-4 py-2 text-sm bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-brand-500 focus:border-brand-500 dark:text-white transition-all outline-none" placeholder="Search data...">
      </div>

      <!-- Theme Toggle Button -->
      <button id="theme-toggle" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none rounded-lg text-sm p-2.5 transition-colors">
        <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg"></i>
        <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg"></i>
      </button>
    </div>
  </header>

  <!-- Content Area -->
  <div id="app-content" class="flex-1 overflow-x-hidden overflow-y-auto p-8 transition-colors duration-300 relative z-0">
    <!-- Dynamic content will be injected here via JS -->
  </div>
</main>

<!-- Toast Notification Container -->
<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-3"></div>

<!-- Application Scripts Modularized -->
<script src="js/theme.js"></script>
<script src="js/admin.js"></script>
<script src="js/customer.js"></script>
<script src="js/category.js"></script>
<script src="js/product.js"></script>
<script src="js/main.js"></script>
<script src="js/order.js"></script>
<script src="js/payment.js"></script>
</body>
</html>
